{% extends "base.html" %}
{% block title %}Iniciar Sesión - {{ app_name }}{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card fade-in">
    <div class="auth-logo">⚽</div>
    <h1 class="auth-title">Polla Mundial 2026</h1>
    <p class="auth-subtitle">USA / Canadá / México — 44 años de tradición</p>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label" for="username">Usuario o Email</label>
        <input type="text" id="username" name="username" class="form-input" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input type="password" id="password" name="password" class="form-input" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Iniciar Sesión</button>
    </form>
    <p class="auth-link">¿No tienes cuenta? <a href="{{ url_for('register') }}">Regístrate aquí</a></p>
  </div>
</div>
{% endblock %}
