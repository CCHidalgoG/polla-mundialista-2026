{% extends "base.html" %}
{% block title %}Registro - {{ app_name }}{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card fade-in">
    <div class="auth-logo">🏆</div>
    <h1 class="auth-title">Únete a la Polla</h1>
    <p class="auth-subtitle">Apuesta: $250.000 COP — Premios: 80% / 15% / 5%</p>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label" for="username">Nombre de usuario</label>
        <input type="text" id="username" name="username" class="form-input" required minlength="3" value="{{ request.form.get('username', '') }}">
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" name="email" class="form-input" required value="{{ request.form.get('email', '') }}">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input type="password" id="password" name="password" class="form-input" required minlength="4">
      </div>
      <div class="form-group">
        <label class="form-label" for="password2">Confirmar Contraseña</label>
        <input type="password" id="password2" name="password2" class="form-input" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Registrarse</button>
    </form>
    <p class="auth-link">¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión</a></p>
  </div>
</div>
{% endblock %}
